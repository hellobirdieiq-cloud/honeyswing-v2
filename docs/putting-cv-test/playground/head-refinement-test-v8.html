    '<br>3σ '+th.toFixed(2)+'px · noise σ '+sd.toFixed(2)+'px · ramp floor '+floor.toFixed(2)+'px<br><br>'+rows;
  $('run').disabled = false;
  runData = {pts, disp, onset, th};
};
$('gtk').onclick = () => seek(C().events.takeaway);
$('gimp').onclick = () => seek(C().events.impact);
document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight'){ e.preventDefault(); seek(frame+1); }
  if(e.key==='ArrowLeft'){ e.preventDefault(); seek(frame-1); }
});
</script>
</body>
